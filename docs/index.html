<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101417" />
    <title>Codex in Phone</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101417;
        color: #edf2f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(70, 115, 91, 0.22), transparent 42%),
          linear-gradient(315deg, rgba(70, 98, 137, 0.18), transparent 50%),
          #101417;
      }

      main {
        width: min(100%, 430px);
        display: grid;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 8px;
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
        line-height: 1.15;
        font-weight: 720;
        letter-spacing: 0;
      }

      .status {
        min-height: 146px;
        border: 1px solid rgba(237, 242, 244, 0.16);
        border-radius: 8px;
        padding: 20px;
        background: rgba(16, 20, 23, 0.7);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.22);
        display: grid;
        gap: 12px;
      }

      .label {
        margin: 0;
        color: #9fb1b6;
        font-size: 0.82rem;
        line-height: 1.4;
      }

      .message {
        margin: 0;
        font-size: 1.12rem;
        line-height: 1.45;
        font-weight: 640;
      }

      .url {
        width: 100%;
        min-height: 34px;
        overflow-wrap: anywhere;
        color: #b8c9ce;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono",
          monospace;
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button,
      a.button {
        min-height: 46px;
        border-radius: 8px;
        border: 1px solid rgba(237, 242, 244, 0.16);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        color: #edf2f4;
        background: #223039;
        font: inherit;
        font-weight: 680;
        text-decoration: none;
        cursor: pointer;
      }

      button.primary,
      a.primary {
        border-color: #74b391;
        background: #4b8062;
      }

      button:disabled,
      a[aria-disabled="true"] {
        opacity: 0.48;
        pointer-events: none;
      }

      .meta {
        color: #8aa0a6;
        font-size: 0.78rem;
        line-height: 1.5;
      }

      @media (max-width: 360px) {
        body {
          padding: 18px;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img class="logo" src="./icon.svg" alt="" width="44" height="44" />
        <h1>Codex in Phone</h1>
      </div>

      <section class="status" aria-live="polite">
        <p class="label" id="state-label">Launcher</p>
        <p class="message" id="message">최신 주소를 확인하는 중</p>
        <div class="url" id="current-url"></div>
        <div class="actions">
          <a class="button primary" id="open-link" href="#" aria-disabled="true">
            열기
          </a>
          <button id="retry-button" type="button">다시 확인</button>
        </div>
      </section>

      <a class="button" id="manage-link" href="https://github.com/codespaces"
        >Codespaces</a
      >
      <div class="meta" id="updated-at"></div>
    </main>

    <script>
      const JSON_PATH = "./current-url.json";
      const CACHE_KEY = "codexinphone.latestLauncherState";
      const REDIRECT_DELAY_MS = 700;

      const stateLabel = document.querySelector("#state-label");
      const message = document.querySelector("#message");
      const currentUrl = document.querySelector("#current-url");
      const updatedAt = document.querySelector("#updated-at");
      const openLink = document.querySelector("#open-link");
      const retryButton = document.querySelector("#retry-button");
      const manageLink = document.querySelector("#manage-link");

      let redirectTimer = 0;

      function isSafeAppUrl(value) {
        try {
          const url = new URL(value);
          return (
            url.protocol === "https:" &&
            /^[a-z0-9-]+\.lhr\.life$/i.test(url.hostname)
          );
        } catch {
          return false;
        }
      }

      function isSafeFixedUrl(value) {
        try {
          const url = new URL(value);
          return (
            url.protocol === "https:" &&
            /^[a-z0-9-]+-\d+\.app\.github\.dev$/i.test(url.hostname)
          );
        } catch {
          return false;
        }
      }

      function trimSlash(value) {
        return value.replace(/\/$/, "");
      }

      function setOpenLink(url) {
        openLink.href = url;
        openLink.removeAttribute("aria-disabled");
      }

      function renderError(text) {
        clearTimeout(redirectTimer);
        stateLabel.textContent = "연결 대기";
        message.textContent = text;
        currentUrl.textContent = "";
        updatedAt.textContent = "";
        openLink.href = "#";
        openLink.setAttribute("aria-disabled", "true");
      }

      function renderReady(data, source) {
        clearTimeout(redirectTimer);
        stateLabel.textContent = source === "cache" ? "저장된 주소" : "최신 주소";
        message.textContent = "앱을 여는 중";
        currentUrl.textContent = data.url;
        setOpenLink(data.url);

        if (data.manageUrl) {
          manageLink.href = data.manageUrl;
        }

        if (data.updatedAt) {
          const formatted = new Intl.DateTimeFormat("ko-KR", {
            dateStyle: "medium",
            timeStyle: "short",
          }).format(new Date(data.updatedAt));
          updatedAt.textContent = `업데이트: ${formatted}`;
        }

        redirectTimer = window.setTimeout(() => {
          window.location.replace(data.url);
        }, REDIRECT_DELAY_MS);
      }

      async function readLauncherState() {
        const response = await fetch(`${JSON_PATH}?t=${Date.now()}`, {
          cache: "no-store",
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (!data || !isSafeAppUrl(data.url)) {
          throw new Error("Invalid launcher URL");
        }
        return data;
      }

      async function readLiveState(baseState) {
        if (!baseState || !isSafeFixedUrl(baseState.fixedUrl)) {
          return null;
        }

        try {
          const response = await fetch(
            `${trimSlash(baseState.fixedUrl)}/api/config?t=${Date.now()}`,
            { cache: "no-store" },
          );
          if (!response.ok) {
            return null;
          }

          const config = await response.json();
          if (!isSafeAppUrl(config.publicOrigin)) {
            return null;
          }

          return {
            ...baseState,
            url: config.publicOrigin,
            updatedAt: new Date().toISOString(),
            source: "codespaces-config",
            fixedUrl: config.codespace?.fixedUrl || baseState.fixedUrl,
            manageUrl: config.codespace?.manageUrl || baseState.manageUrl,
          };
        } catch {
          return null;
        }
      }

      function parseCachedState() {
        try {
          const value = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
          return value && isSafeAppUrl(value.url) ? value : null;
        } catch {
          return null;
        }
      }

      async function loadLatest() {
        renderError("최신 주소를 확인하는 중");

        try {
          const baseState = await readLauncherState();
          const liveState = await readLiveState(baseState);
          const data = liveState || baseState;

          localStorage.setItem(CACHE_KEY, JSON.stringify(data));
          renderReady(data, "network");
        } catch {
          const cached = parseCachedState();
          if (cached) {
            const liveState = await readLiveState(cached);
            const data = liveState || cached;
            localStorage.setItem(CACHE_KEY, JSON.stringify(data));
            renderReady(data, liveState ? "network" : "cache");
            return;
          }

          renderError("아직 열 수 있는 주소가 없습니다");
        }
      }

      retryButton.addEventListener("click", loadLatest);

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./launcher-sw.js").catch(() => {});
      }

      loadLatest();
    </script>
  </body>
</html>
